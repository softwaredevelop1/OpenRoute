<!DOCTYPE html>
<html>
<head>
<title>OpenRoute Navigation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:sans-serif; }
#map { height:100vh; width:100vw; }

#ui {
  position:fixed;
  top:10px; left:10px; right:10px;
  z-index:9999;
  display:flex;
  gap:6px;
  background:white;
  padding:8px;
  border-radius:10px;
}

#searchBox { flex:1; padding:10px; }

#infoPanel {
  position:fixed;
  bottom:10px;
  left:10px;
  right:10px;
  max-height:280px;
  overflow-y:auto;
  background:white;
  padding:10px;
  border-radius:10px;
  z-index:9999;
}

button {
  padding:8px;
  border:none;
  border-radius:8px;
  background:#2b7cff;
  color:white;
  margin-top:6px;
}

.modeBtn { background:#ccc; color:black; }
.active { background:#2b7cff; color:white; }

.nav-arrow {
  font-size:26px;
  transition:transform 0.2s linear;
}
</style>
</head>

<body>

<div id="ui">
  <input id="searchBox" placeholder="Search place...">
  <button onclick="searchPlace()">Search</button>
</div>

<div id="map"></div>
<div id="infoPanel">Search for a place</div>

<script>

/* ================= MAP ================= */
const map = L.map("map").setView([36.5,-5],12);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom:19
}).addTo(map);

/* ================= ICONS ================= */
const redIcon = new L.Icon({
  iconUrl:"https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png",
  shadowUrl:"https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
  iconSize:[25,41],
  iconAnchor:[12,41]
});

const arrowIcon = L.divIcon({
  className:"nav-arrow",
  html:"➤",
  iconSize:[20,20],
  iconAnchor:[10,10]
});

/* ================= STATE ================= */
let userPos=null;
let heading=0;

let userMarker=null;
let navMarker=null;

let destination=null;
let destinationMarker=null;

let routeLayer=null;
let routeCoords=[];

let navigationActive=false;
let followMode=false;

let navSteps=[];
let currentStep=0;

let mode="foot";
let lastPlace=null;

/* ================= GPS ================= */
navigator.geolocation.watchPosition(pos=>{
  userPos=pos.coords;
  const latlng=[userPos.latitude,userPos.longitude];

  if(pos.coords.heading!==null) heading=pos.coords.heading;

  if(navigationActive){

    if(!navMarker){
      navMarker=L.marker(latlng,{icon:arrowIcon}).addTo(map);
    } else navMarker.setLatLng(latlng);

    const el=navMarker.getElement();
    if(el) el.style.transform=`rotate(${heading}deg)`;

    if(followMode) map.setView(latlng,map.getZoom());

    updateProgress();

  } else {

    if(!userMarker){
      userMarker=L.marker(latlng).addTo(map).bindPopup("You are here 📍");
      map.setView(latlng,14);
    } else userMarker.setLatLng(latlng);
  }
});

/* ================= SEARCH ================= */
function searchPlace(){
  const q=document.getElementById("searchBox").value;

  fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}`)
  .then(r=>r.json())
  .then(data=>{
    if(!data.length) return alert("Not found");

    const p=data[0];
    lastPlace=p;

    destination={
      lat:+p.lat,
      lon:+p.lon,
      name:p.display_name
    };

    map.setView([p.lat,p.lon],15);

    if(!destinationMarker){
      destinationMarker=L.marker([p.lat,p.lon],{icon:redIcon}).addTo(map);
    } else destinationMarker.setLatLng([p.lat,p.lon]);

    destinationMarker.bindPopup(p.display_name).openPopup();

    showPlaceInfo(p);
  });
}

/* ================= PLACE INFO ================= */
function showPlaceInfo(place){
  document.getElementById("infoPanel").innerHTML=`
    <h3>${place.display_name}</h3>
    <button onclick="openNavUI()">Directions</button>
  `;
}

/* ================= NAV UI ================= */
function openNavUI(){
  document.getElementById("infoPanel").innerHTML=`
    <h3>Navigation</h3>

    <button onclick="startNav()">▶ Start</button>
    <button onclick="pauseNav()">⏸ Pause</button>
    <button onclick="stopNav()">⏹ Stop</button>
    <button onclick="recenter()">🎯 Recenter</button>
    <button onclick="goBack()">⬅ Back</button>

    <div id="routeInfo">Ready</div>
  `;
}

/* ================= CONTROLS ================= */
function startNav(){
  navigationActive=true;
  followMode=true;

  if(userMarker){
    map.removeLayer(userMarker);
    userMarker=null;
  }

  calculateRoute();
}

function pauseNav(){ followMode=false; }
function recenter(){ followMode=true; }

function stopNav(){
  navigationActive=false;
  followMode=false;

  if(navMarker){
    map.removeLayer(navMarker);
    navMarker=null;
  }
}

function goBack(){
  if(routeLayer){
    map.removeLayer(routeLayer);
    routeLayer=null;
  }
  stopNav();
  if(lastPlace) showPlaceInfo(lastPlace);
}

/* ================= ROUTE FETCH ================= */
function calculateRoute(){

  if(!userPos||!destination) return;

  const url=
  `https://router.project-osrm.org/route/v1/${mode}/`+
  `${userPos.longitude},${userPos.latitude};${destination.lon},${destination.lat}`+
  `?overview=full&geometries=geojson&steps=true`;

  fetch(url)
  .then(r=>r.json())
  .then(data=>{

    const route=data.routes[0];

    routeCoords=route.geometry.coordinates;
    navSteps=route.legs[0].steps;
    currentStep=0;

    if(routeLayer) map.removeLayer(routeLayer);

    routeLayer=L.geoJSON(route.geometry,{
      style:{color:"blue",weight:5}
    }).addTo(map);

    map.fitBounds(routeLayer.getBounds());

    updateStepUI();
  });
}

/* ================= STEP UI ================= */
function updateStepUI(){
  if(!navSteps.length) return;

  const s=navSteps[currentStep];
  const dist=Math.round(s.distance);

  document.getElementById("routeInfo").innerHTML=`
    <p><b>${s.maneuver.instruction || "Continue"}</b></p>
    <p>${dist} m</p>
  `;
}
  /* ================= TURN PROGRESSION ================= */
function updateProgress(){

  if(!navigationActive || !navSteps.length) return;

  const step = navSteps[currentStep];

  const target = step.maneuver.location; // [lon, lat]

  const d = getDistance(
    userPos.latitude,
    userPos.longitude,
    target[1],
    target[0]
  );

  if(d < 0.03 && currentStep < navSteps.length - 1){
    currentStep++;
    updateStepUI();
  }

  trimRoute();

  if(d > 0.08){
    calculateRoute(); // reroute if off path
  }
}

/* ================= ROUTE TRIMMING ================= */
function trimRoute(){

  if(!routeCoords.length || !navMarker) return;

  const pos=[userPos.longitude,userPos.latitude];

  let closestIndex=0;
  let minDist=Infinity;

  for(let i=0;i<routeCoords.length;i++){
    const c=routeCoords[i];
    const dx=c[0]-pos[0];
    const dy=c[1]-pos[1];
    const dist=dx*dx+dy*dy;

    if(dist<minDist){
      minDist=dist;
      closestIndex=i;
    }
  }

  const trimmed=routeCoords.slice(closestIndex);

  if(routeLayer) map.removeLayer(routeLayer);

  routeLayer=L.geoJSON({
    type:"LineString",
    coordinates:trimmed
  },{
    style:{color:"blue",weight:5}
  }).addTo(map);
}

/* ================= DISTANCE ================= */
function getDistance(lat1, lon1, lat2, lon2){
  const R=6371;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;

  const a=
    Math.sin(dLat/2)**2+
    Math.cos(lat1*Math.PI/180)*
    Math.cos(lat2*Math.PI/180)*
    Math.sin(dLon/2)**2;

  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

</script>
</body>
</html>
