<!DOCTYPE html>
<html>
<head>
  <title>OpenRoute Navigation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin: 0; font-family: sans-serif; }

    #map { height: 100vh; width: 100vw; }

    #ui {
      position: fixed;
      top: 10px;
      left: 10px;
      right: 10px;
      z-index: 9999;
      display: flex;
      gap: 6px;
      background: white;
      padding: 8px;
      border-radius: 10px;
    }

    #searchBox {
      flex: 1;
      padding: 10px;
    }

    #infoPanel {
      position: fixed;
      bottom: 10px;
      left: 10px;
      right: 10px;
      background: white;
      padding: 10px;
      max-height: 280px;
      overflow-y: auto;
      border-radius: 10px;
      z-index: 9999;
    }

    button {
      padding: 8px;
      border: none;
      border-radius: 8px;
      background: #2b7cff;
      color: white;
      margin-top: 6px;
    }

    .modeBtn {
      background: #ccc;
      color: black;
    }

    .active {
      background: #2b7cff;
      color: white;
    }

    .nav-arrow {
      font-size: 22px;
      transform: rotate(0deg);
    }
  </style>
</head>

<body>

<div id="ui">
  <input id="searchBox" placeholder="Search place...">
  <button onclick="searchPlace()">Search</button>
</div>

<div id="map"></div>
<div id="infoPanel">Search for a place</div>

<script>
const map = L.map("map").setView([36.5, -5], 12);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19
}).addTo(map);

/* ===== ICONS ===== */
const redIcon = new L.Icon({
  iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png",
  shadowUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
  iconSize: [25, 41],
  iconAnchor: [12, 41]
});

const arrowIcon = L.divIcon({
  className: "nav-arrow",
  html: "➤",
  iconSize: [20, 20],
  iconAnchor: [10, 10]
});

/* ===== STATE ===== */
let userPos = null;
let userMarker = null;
let headingMarker = null;

let destination = null;
let destinationMarker = null;

let routeLayer = null;
let navigationActive = false;
let followMode = false;

let mode = "foot";
let lastPlace = null;

/* ===== GPS ===== */
navigator.geolocation.watchPosition(pos => {
  userPos = pos.coords;
  const latlng = [userPos.latitude, userPos.longitude];

  if (navigationActive) {
    if (!headingMarker) {
      headingMarker = L.marker(latlng, { icon: arrowIcon }).addTo(map);
    } else {
      headingMarker.setLatLng(latlng);
    }

    if (followMode) {
      map.setView(latlng, map.getZoom());
    }

  } else {
    if (!userMarker) {
      userMarker = L.marker(latlng).addTo(map).bindPopup("You are here 📍");
      map.setView(latlng, 14);
    } else {
      userMarker.setLatLng(latlng);
    }
  }
});

/* ===== SEARCH ===== */
function searchPlace() {
  const q = document.getElementById("searchBox").value;

  fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}`)
    .then(r => r.json())
    .then(data => {
      if (!data.length) return alert("Not found");

      const p = data[0];
      lastPlace = p;

      destination = {
        lat: +p.lat,
        lon: +p.lon,
        name: p.display_name
      };

      map.setView([p.lat, p.lon], 15);

      if (!destinationMarker) {
        destinationMarker = L.marker([p.lat, p.lon], { icon: redIcon }).addTo(map);
      } else {
        destinationMarker.setLatLng([p.lat, p.lon]);
      }

      destinationMarker.bindPopup(p.display_name).openPopup();
      showPlaceInfo(p);
    });
}

/* ===== INFO ===== */
function showPlaceInfo(place) {
  const panel = document.getElementById("infoPanel");

  panel.innerHTML = `
    <h3>${place.display_name}</h3>
    <button onclick="openDirections()">Directions</button>
  `;
}

/* ===== DIRECTIONS UI ===== */
function openDirections() {
  document.getElementById("infoPanel").innerHTML = `
    <button onclick="goBack()">⬅ Back</button><br>

    <button class="modeBtn active" onclick="setMode('foot', this)">🚶 Walk</button>
    <button class="modeBtn" onclick="setMode('driving', this)">🚗 Drive</button>

    <button onclick="startNavigation()">▶ Start</button>
    <button onclick="stopNavigation()">⏹ Stop</button>
    <button onclick="recenter()">🎯 Recenter</button>

    <div id="routeInfo">Calculating…</div>
  `;

  calculateRoute();
}

function setMode(m, btn) {
  mode = m;
  document.querySelectorAll(".modeBtn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  calculateRoute();
}

/* ===== NAVIGATION CONTROL ===== */
function startNavigation() {
  navigationActive = true;
  followMode = true;

  if (userMarker) {
    map.removeLayer(userMarker);
    userMarker = null;
  }
}

function stopNavigation() {
  navigationActive = false;
  followMode = false;

  if (headingMarker) {
    map.removeLayer(headingMarker);
    headingMarker = null;
  }
}

function recenter() {
  followMode = true;
}

function goBack() {
  if (routeLayer) {
    map.removeLayer(routeLayer);
    routeLayer = null;
  }

  navigationActive = false;
  followMode = false;

  if (headingMarker) {
    map.removeLayer(headingMarker);
    headingMarker = null;
  }

  if (lastPlace) showPlaceInfo(lastPlace);
}

/* ===== ROUTING ===== */
function calculateRoute() {
  if (!userPos || !destination) return;

  const url =
    `https://router.project-osrm.org/route/v1/${mode}/` +
    `${userPos.longitude},${userPos.latitude};${destination.lon},${destination.lat}` +
    `?overview=full&geometries=geojson`;

  fetch(url)
    .then(r => r.json())
    .then(data => {
      const route = data.routes[0];

      if (routeLayer) map.removeLayer(routeLayer);

      routeLayer = L.geoJSON(route.geometry, {
        style: { color: "blue", weight: 5 }
      }).addTo(map);

      map.fitBounds(routeLayer.getBounds());

      const km = route.distance / 1000;
      const minutesTotal = Math.round((km / (mode === "driving" ? 50 : 5)) * 60);

      const hrs = Math.floor(minutesTotal / 60);
      const mins = minutesTotal % 60;

      const etaText = hrs > 0 ? `${hrs} hr ${mins} min` : `${mins} min`;

      document.getElementById("routeInfo").innerHTML =
        `<p>Distance: ${km.toFixed(2)} km</p><p>ETA: ${etaText}</p>`;
    });
}
</script>
</body>
</html>
